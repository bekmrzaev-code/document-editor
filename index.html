<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOL Studio — Scan & Redact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=6" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- ───────────────────────── Top bar ───────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="m14.5 4.5 5 5L8 21l-5 1 1-5z"/></svg>
        </div>
        <div class="brand-text"><h1>BOL&nbsp;Studio</h1><span>Scan &amp; Redact</span></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="btn-open">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          Open
        </button>
        <div class="divider-v"></div>
        <button class="btn btn-ghost" id="btn-png" disabled>PNG</button>
        <button class="btn btn-primary" id="btn-pdf" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
          Export PDF
        </button>
      </div>
    </header>

    <div class="body">
      <!-- ───────────────────────── Tool rail ───────────────────────── -->
      <nav class="rail" id="rail">
        <button class="tool active" data-tool="erase" title="Erase a detected number (E)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
          <span>Erase</span>
        </button>
        <button class="tool" data-tool="cover" title="Cover an area with the fill color (C)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9" opacity=".5"/></svg>
          <span>Cover</span>
        </button>
        <button class="tool" data-tool="brush" title="Brush (B)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.06 11.9 1.86 19.1a2 2 0 1 0 2.83 2.83l7.2-7.2"/><path d="M14 6a3.5 3.5 0 0 1 4 0 3.5 3.5 0 0 1 0 4l-6.5 6.5-4-4z" opacity=".8"/><path d="m17 3 4 4"/></svg>
          <span>Brush</span>
        </button>

        <div class="rail-sep"></div>

        <button class="tool" id="btn-undo" title="Undo (⌘Z)" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          <span>Undo</span>
        </button>
        <button class="tool" id="btn-redo" title="Redo (⌘⇧Z)" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
          <span>Redo</span>
        </button>
        <button class="tool" id="btn-reset" title="Reset page" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>
          <span>Reset</span>
        </button>
      </nav>

      <!-- ───────────────────────── Stage ───────────────────────── -->
      <main class="stage" id="stage">
        <div class="dropzone" id="dropzone">
          <div class="dz-inner">
            <div class="dz-icon">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3-3 3 3"/></svg>
            </div>
            <h2>Drop a PDF or image</h2>
            <p>Numbers are detected automatically — click to erase them, painted over with the background color.</p>
            <button class="btn btn-primary lg" id="dz-browse">Choose a file</button>
            <span class="dz-hint">PDF · JPG · PNG — runs locally on your machine</span>
          </div>
        </div>
        <div class="canvas-host" id="canvas-host" hidden></div>
        <div class="loader" id="loader" hidden>
          <div class="loader-card">
            <div class="spinner"></div>
            <div class="loader-text" id="loader-text">Working…</div>
            <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
          </div>
        </div>
      </main>

      <!-- ───────────────────────── Inspector ───────────────────────── -->
      <aside class="inspector" id="inspector">
        <!-- Contextual: Fill (erase / cover) -->
        <section class="panel" id="panel-fill">
          <div class="panel-head">Fill color</div>
          <div class="seg" id="fill-mode">
            <button class="seg-btn active" data-mode="auto">Auto background</button>
            <button class="seg-btn" data-mode="fixed">Fixed</button>
          </div>
          <label class="color-row" id="color-row">
            <input type="color" id="fill-color" value="#ffffff" />
            <div class="color-meta"><span class="color-label">Cover color</span><span class="color-hex" id="color-hex">Sampled around each number</span></div>
          </label>
        </section>

        <!-- Contextual: Brush -->
        <section class="panel" id="panel-brush" hidden>
          <div class="panel-head">Brush</div>
          <div class="paint-row">
            <label class="color-chip"><input type="color" id="paint-color" value="#e23744"><span>Color</span></label>
            <label class="slider-row grow"><span>Size</span><input type="range" id="sl-size" min="1" max="60" value="8"></label>
          </div>
        </section>

        <!-- Enhance (always) -->
        <section class="panel">
          <div class="panel-head">Enhance</div>
          <div class="chips" id="scan-modes">
            <button class="chip active" data-mode="original">Original</button>
            <button class="chip" data-mode="auto">Auto</button>
            <button class="chip" data-mode="gray">Gray</button>
            <button class="chip" data-mode="bw">B&amp;W</button>
          </div>
          <button class="btn btn-ghost wide mt" id="btn-autofix" disabled>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="m9 12 2 2 4-4"/></svg>
            Straighten &amp; crop
          </button>
        </section>

        <!-- Numbers (always) -->
        <section class="panel">
          <div class="panel-head">Numbers <span class="pill" id="count-pill">0</span></div>
          <label class="toggle-row"><input type="checkbox" id="toggle-overlays" checked><span>Show highlights</span></label>
          <button class="btn btn-ghost wide" id="btn-erase-all" disabled>Erase all numbers</button>
        </section>

        <!-- Pages (always) -->
        <section class="panel page-panel" id="page-panel" hidden>
          <div class="panel-head">
            Pages
            <span class="zoom-mini">
              <button id="zoom-out" title="Zoom out">−</button>
              <button id="zoom-fit" title="Fit">Fit</button>
              <button id="zoom-in" title="Zoom in">+</button>
            </span>
          </div>
          <div class="thumbs" id="thumbs"></div>
        </section>
      </aside>
    </div>

    <footer class="statusbar">
      <span class="status-item" id="status-msg">Ready — open a PDF or image to begin.</span>
      <span class="status-spacer"></span>
      <span class="status-item mono" id="status-page"></span>
    </footer>
  </div>

  <div class="toasts" id="toasts"></div>
  <input type="file" id="file-input" accept="application/pdf,image/*,.pdf,.png,.jpg,.jpeg,.webp" hidden />
  <script src="js/app.js?v=6" defer></script>
</body>
</html>
